name: BMAD Agent Framework CI/CD

on:
  push:
    branches: [ main, develop, 'feat/**' ]
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: './src/BmadAgentFramework/BmadAgentFramework.csproj'
  TEST_PROJECT_PATH: './tests/BmadAgentFramework.Tests/BmadAgentFramework.Tests.csproj'
  SOLUTION_PATH: './BmadAgentFramework.sln'

jobs:
  # ============================================================
  # JOB 1: Build e Unit Test
  # ============================================================
  build-and-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: 📥 Checkout codice
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: 🔍 Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: 🏗️ Build soluzione
        run: dotnet build ${{ env.SOLUTION_PATH }} --no-restore --configuration Release

      - name: 🧪 Esegui unit test con coverage
        run: |
          dotnet test ${{ env.TEST_PROJECT_PATH }} \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./test-results

      - name: 📊 Pubblica risultati test
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Unit Test Results
          path: './test-results/*.trx'
          reporter: dotnet-trx

      - name: 📈 Pubblica code coverage
        uses: codecov/codecov-action@v4
        if: success()
        with:
          directory: ./test-results
          fail_ci_if_error: false

  # ============================================================
  # JOB 2: Security Scan (SAST)
  # ============================================================
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout codice
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 🔍 Scan vulnerabilità NuGet
        run: |
          dotnet restore ${{ env.SOLUTION_PATH }}
          dotnet list ${{ env.SOLUTION_PATH }} package --vulnerable --include-transitive 2>&1 | \
            tee vulnerability-report.txt || true

      - name: 📤 Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: vulnerability-report.txt

  # ============================================================
  # JOB 3: Deploy su Azure (solo su push a main)
  # ============================================================
  deploy-staging:
    name: 🚀 Deploy Staging
    runs-on: ubuntu-latest
    needs: [build-and-test, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
    environment:
      name: staging
      url: https://func-bmad-staging.azurewebsites.net

    steps:
      - name: 📥 Checkout codice
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Publish applicazione
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --output ./publish

      - name: 🔑 Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 🚀 Deploy su Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: 'func-bmad-staging'
          package: './publish'

  # ============================================================
  # JOB 4: Deploy Produzione (con approvazione manuale)
  # ============================================================
  deploy-production:
    name: 🌐 Deploy Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    permissions:
      contents: read
      id-token: write
    environment:
      name: production
      url: https://func-bmad-prod.azurewebsites.net

    steps:
      - name: 📥 Checkout codice
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Publish applicazione
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --output ./publish

      - name: 🔑 Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 🚀 Deploy su Azure Functions (Production)
        uses: Azure/functions-action@v1
        with:
          app-name: 'func-bmad-prod'
          package: './publish'
